name: ⚙️ CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiga-family/ci/actions/setup/variables@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
      - uses: taiga-family/ci/actions/setup/node@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
        with:
          audit: true

      - run: npm run cspell -- --no-progress
      - run: npx nx run-many --target=build
      - run: |
          if [[ "${{ env.SUPPORT_AUTO_PUSH }}" == "true" ]]; then
              npm run stylelint -- --fix
              npm run prettier -- --write
              npm run lint -- --fix
              HTML_ESLINT=true npm run lint -- --fix --no-error-on-unmatched-pattern
          else
              npm run stylelint
              npm run prettier -- --check
              npm run lint
              HTML_ESLINT=true npm run lint -- --no-error-on-unmatched-pattern
          fi

      - uses: taiga-family/ci/actions/auto/push@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: Unit tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/setup/variables@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
      - uses: taiga-family/ci/actions/setup/node@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
      - run: npm test

  release-it-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: taiga-family/ci/actions/setup/node@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
      - run: |
          # prevent fatal: ref HEAD is not a symbolic ref
          git checkout -f main > /dev/null

          # node_modules is correct
          # because installed before checkout main
          npx release-it --dry-run --ci --no-git.requireCommits

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
