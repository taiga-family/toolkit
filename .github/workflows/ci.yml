name: ⚙️ CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
      - uses: taiga-family/actions/setup-node@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
        with:
          audit: true

      - run: npm run cspell -- --no-progress
      - run: npx nx run-many --target=build
      - run: echo "$(git log -1 --pretty=format:"%s")" | npx commitlint --verbose

      - run: |
          if [[ "${{ env.SUPPORT_AUTO_PUSH }}" == "true" ]]; then
              npm run stylelint -- --fix
              npm run prettier -- --write
              npm run lint -- --fix
              HTML_ESLINT=true npm run lint -- --fix --no-error-on-unmatched-pattern
          else
              npm run stylelint
              npm run prettier -- --check
              npm run lint
              HTML_ESLINT=true npm run lint -- --no-error-on-unmatched-pattern
          fi

      - name: Check eslint-plugin-experience-next ESM output
        run: |
          if grep -R "__filename\|__dirname" dist/eslint-plugin-experience-next; then
            echo "CommonJS globals must not be bundled into ESM output"

            exit 1
          fi

          npm --prefix ./dist/eslint-plugin-experience-next install --omit=dev
          node --input-type=module -e "import('./dist/eslint-plugin-experience-next/index.esm.js').then(() => console.log('esm ok'))"

      - uses: taiga-family/actions/auto-push@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
      - uses: taiga-family/actions/setup-node@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
      - run: npx nx build commitlint-config
      - name: Run commitlint
        env:
          COMMIT_MESSAGE:
            ${{ github.event_name == 'pull_request' && github.event.pull_request.title ||
            github.event.head_commit.message }}
        run: printf '%s\n' "$COMMIT_MESSAGE" | npx commitlint --verbose

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: Unit tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      npm_config_engine_strict: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
      - uses: taiga-family/actions/setup-node@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
        with:
          node-version: 22.x # validate that we can build with previous node version
      - run: npm test

  release-it-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: taiga-family/actions/setup-node@a12b79beab3aea8bd840e48e902a2084d282e1a6 # v2.5.0
      - run: |
          # prevent fatal: ref HEAD is not a symbolic ref
          git checkout -f main > /dev/null

          # node_modules is correct
          # because installed before checkout main
          npx release-it --dry-run --ci --no-git.requireCommits

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
